<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krafty Menu</title>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>

  <ul class="checkerList">
    <li><button type="button" id="js-headCheckButton" class="checkerButton headCheckButton">Head Check</button></li>
    <li><button type="button" id="js-nestCheckButton" class="checkerButton nestCheckButton">Nest Check</button></li>
    <li><button type="button" id="js-headingCheckButton" class="checkerButton headingCheckButton">Heading Check</button></li>
    <li><button type="button" id="js-imageCheckButton" class="checkerButton imageCheckButton">Image Check</button></li>
    <li><button type="button" id="js-outlineCheckButton" class="checkerButton outlineCheckButton">Outline Check</button></li>
    <li><button type="button" id="js-altCheckButton" class="checkerButton altCheckButton">alt Check</button></li>
    <li><button type="button" id="js-brightnessCheckButton" class="checkerButton brightnessCheckButton">Brightness Check</button></li>
  </ul>

  <p id="js-status" class="status" role="status" hidden></p>

  <script src="../checkers.js"></script>
  <script src="popup.js"></script>
</body>
</html>
